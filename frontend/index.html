<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>感情分析アプリ</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; }
        textarea { width: 100%; height: 100px; font-size: 16px; }
        button { margin-top: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; }
        .positive { color: blue; }
        .negative { color: red; }
    </style>
</head>
<body>
    <h1>感情分析アプリ</h1>
    <textarea id="textInput" placeholder="テキストを入力してください"></textarea>
    <br>
    <button onclick="analyze()">分析</button>
    <div id="result"></div>

    <script>
        async function analyze() {
            const text = document.getElementById("textInput").value;
            const resultDiv = document.getElementById("result");

            try {
                const response = await fetch("http://127.0.0.1:8000/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();

                if (data.label === 1) {
                    resultDiv.className = "positive";
                    resultDiv.textContent = "😊 ポジティブ";
                } else {
                    resultDiv.className = "negative";
                    resultDiv.textContent = "😞 ネガティブ";
                }
            } catch (error) {
                resultDiv.className = "";
                resultDiv.textContent = "エラーが発生しました";
            }
        }
    </script>
</body>
</html>
